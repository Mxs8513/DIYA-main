name: Keep demo warm

# Render's free tier sleeps after ~15 min idle (first hit then takes ~30-50s).
# This pings the health endpoint roughly every 10 minutes so the public demo
# stays warm for recruiters. Best-effort: GitHub may delay scheduled runs, and
# the frontend also retries gracefully on a cold start.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://diya-api.onrender.com/api/health || echo "000")
            echo "attempt $i → HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 15
          done
          echo "health check did not return 200 (server may be waking); not failing the job"
